    <div class="app-shell">
      <header class="main-header">
        <button id="mobile-nav-toggle" class="mobile-nav-toggle" type="button" aria-controls="primary-sidebar" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
          <span>菜单</span>
        </button>
        <div class="header-title">
          <p class="eyebrow">本地单机版</p>
          <h1 id="page-title">专项工作台</h1>
        </div>
        <div class="header-actions">
          <span id="header-batch" class="header-chip">暂无批次</span>
          <span id="last-sync" class="header-chip">最近同步 --:--</span>
          <span id="service-status" class="status status-pending">连接中</span>
        </div>
      </header>

      <main id="main-content" class="main-content" tabindex="-1">
        <section class="card">
          <div class="section-header">
            <div>
              <p class="eyebrow">批次 #1</p>
              <h2>专项概览</h2>
            </div>
          </div>
          <div id="metric-grid" class="metric-grid">
            <div class="metric-card skeleton"></div>
            <div class="metric-card skeleton"></div>
            <div class="metric-card skeleton"></div>
            <div class="metric-card skeleton"></div>
          </div>
        </section>

        <section class="card">
          <div class="section-header">
            <div>
              <p class="eyebrow">问题</p>
              <h2>地市问题分布</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>地市</th>
                  <th>问题数量</th>
                  <th>占比</th>
                </tr>
              </thead>
              <tbody id="city-issue-table">
                <tr>
                  <td colspan="3">正在加载工作台数据</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
      <p id="global-status" class="sr-only" role="status" aria-live="polite"></p>
    </div>

    <script type="module" src="/app.js?v=20260718-2"></script>

</html>
